<!DOCTYPE html>
<html lang="en">
<head>
    <!-- SEO Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Moonveil SMP - Frequently Asked Questions">
    <meta name="keywords" content="Minecraft, server, FAQ, Moonveil SMP, gaming">
    <meta name="author" content="Moonveil SMP">
    <meta property="og:title" content="Moonveil SMP FAQ">
    <meta property="og:description" content="Frequently Asked Questions">
    <meta property="og:type" content="website">
    <title>Moonveil SMP FAQ</title>
    
    <style>
        /* ============================================
           CSS RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Color Palette - Dark Fantasy Theme */
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --accent-purple: #8b5cf6;
            --accent-purple-light: #a78bfa;
            --accent-blue: #3b82f6;
            --accent-blue-light: #60a5fa;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --glow-purple: rgba(139, 92, 246, 0.5);
            --glow-blue: rgba(59, 130, 246, 0.5);
            --glass-bg: rgba(26, 26, 46, 0.7);
            --glass-border: rgba(139, 92, 246, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ============================================
           ANIMATED STARFIELD BACKGROUND
           ============================================ */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity); transform: scale(1); }
            50% { opacity: 0.2; transform: scale(0.8); }
        }

        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, white, transparent);
            animation: shoot var(--duration) linear infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            100% { transform: translateX(-500px) translateY(500px); opacity: 0; }
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            position: relative;
            padding: 2rem;
            text-align: center;
            z-index: 1;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-purple-light), var(--accent-blue-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px var(--glow-purple);
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--accent-purple-light);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--accent-blue-light);
            text-decoration: underline;
        }

        /* ============================================
           FAQ CONTAINER
           ============================================ */
        .faq-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            z-index: 1;
            position: relative;
        }

        .faq-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .faq-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 20px var(--glow-purple);
        }

        .faq-question {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faq-question::after {
            content: '+';
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            color: var(--accent-purple-light);
        }

        .faq-item.active .faq-question::after {
            transform: rotate(45deg);
        }

        .faq-answer {
            color: var(--text-secondary);
            line-height: 1.8;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .faq-item.active .faq-answer {
            max-height: 500px;
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .faq-container {
                padding: 1rem;
            }

            .faq-item {
                padding: 1.5rem;
            }

            .faq-question {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Load Configuration -->
    <script src="config.js"></script>
    
    <!-- Animated Starfield Background -->
    <div class="starfield" id="starfield"></div>

    <!-- Header -->
    <header class="header">
        <h1 id="server-name">Moonveil SMP</h1>
        <h2>Frequently Asked Questions</h2>
        <a href="index.html" class="back-link">← Back to Store</a>
    </header>

    <!-- FAQ Container -->
    <div class="faq-container" id="faq-container">
        <!-- FAQ items will be dynamically loaded here -->
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const serverName = "Moonveil SMP";

        // Load FAQs from API
        async function loadFAQs() {
            try {
                const response = await fetch('/api/faqs');
                const faqs = await response.json();
                renderFAQ(faqs);
            } catch (error) {
                console.error('Error loading FAQs:', error);
                // Fallback to default FAQs if API fails
                renderFAQ(defaultFAQs);
            }
        }

        const defaultFAQs = [
            {
                question: "How do I receive my rank?",
                answer: "After purchase, your rank will be automatically applied to your account within 5-10 minutes. Make sure you're online in the server for the fastest delivery."
            },
            {
                question: "Can I get a refund?",
                answer: "Refunds are handled on a case-by-case basis. Please contact our support team on Discord with your transaction ID and reason for the refund request."
            },
            {
                question: "Do ranks stack?",
                answer: "Yes! If you purchase a higher rank, you'll keep all perks from lower ranks. For example, purchasing Moon Rank includes all Lunar and Eclipse perks."
            },
            {
                question: "How long do crate keys last?",
                answer: "Crate keys are permanent items in your inventory. They don't expire and can be used whenever you want to open a crate."
            },
            {
                question: "Can I gift a rank to someone else?",
                answer: "Absolutely! During checkout, you can specify the Minecraft username of the player who should receive the rank."
            }
        ];

        // Render FAQ items
        function renderFAQ(faqItems) {
            const faqContainer = document.getElementById('faq-container');
            faqContainer.innerHTML = '';
            
            if (!faqItems || faqItems.length === 0) {
                faqContainer.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No FAQ items available.</p>';
                return;
            }
            
            faqItems.forEach((item, index) => {
                const faqItem = document.createElement('div');
                faqItem.className = 'faq-item';
                faqItem.innerHTML = `
                    <div class="faq-question" onclick="toggleFAQItem(${index})">
                        ${item.question}
                    </div>
                    <div class="faq-answer">
                        ${item.answer}
                    </div>
                `;
                faqContainer.appendChild(faqItem);
            });
        }

        // Toggle FAQ item
        function toggleFAQItem(index) {
            const faqItems = document.querySelectorAll('.faq-item');
            faqItems[index].classList.toggle('active');
        }

        // Create starfield
        function createStarfield() {
            const starfield = document.getElementById('starfield');
            const starCount = 200;
            
            // Create regular stars
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--opacity', Math.random() * 0.7 + 0.3);
                star.style.animationDelay = Math.random() * 5 + 's';
                starfield.appendChild(star);
            }
            
            // Create shooting stars
            for (let i = 0; i < 5; i++) {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                shootingStar.style.left = Math.random() * 50 + 50 + '%';
                shootingStar.style.top = Math.random() * 50 + '%';
                shootingStar.style.setProperty('--duration', (Math.random() * 5 + 5) + 's');
                shootingStar.style.animationDelay = Math.random() * 10 + 's';
                starfield.appendChild(shootingStar);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('server-name').textContent = serverName;
            createStarfield();
            loadFAQs();
        });
    </script>
</body>
</html>
